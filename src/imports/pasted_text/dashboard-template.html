<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', system-ui, sans-serif;
    padding: 24px;
  }
  .dash-wrap {
    width: 100%;
    max-width: 960px;
  }
  .dash-wrap svg {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ── Donut ring draw — r=42, C=264 ── */
  .donut-track  { stroke-dasharray: 264 264; }
  .donut-fill   {
    stroke-dasharray: 0 264;
    stroke-dashoffset: 0;
    transition: none;
  }
  .donut-fill.run {
    animation: donutDraw 1.3s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  @keyframes donutDraw {
    from { stroke-dasharray: 0 264; }
    to   { stroke-dasharray: 230 264; }   /* 87% of 264 ≈ 230 */
  }

  /* ── Chart line draw ── */
  .chart-line {
    stroke-dasharray: 1300;
    stroke-dashoffset: 1300;
  }
  .chart-line.run {
    animation: lineDraw 1.6s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  @keyframes lineDraw { to { stroke-dashoffset: 0; } }

  /* ── Chart area fade ── */
  .chart-area { opacity: 0; }
  .chart-area.run {
    animation: fadeUp 0.8s ease-out 1.2s forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Sparkline draw ── */
  .spark-line {
    stroke-dasharray: 380;
    stroke-dashoffset: 380;
  }
  .spark-line.run {
    animation: lineDraw 1s ease-out 0.2s forwards;
  }

  /* ── Tile fade-in ── */
  .tile-fade { opacity: 0; }
  .tile-fade.run {
    animation: tileIn 0.5s ease-out forwards;
  }
  .tile-fade:nth-child(1).run { animation-delay: 0s; }
  .tile-fade:nth-child(2).run { animation-delay: 0.1s; }
  .tile-fade:nth-child(3).run { animation-delay: 0.2s; }
</style>
</head>

<script>
// ────────────────────────────────────────────
// DATA MODEL
// Each point: x position, y position, lead count, MoM change
// ────────────────────────────────────────────
const DATA = [
  { x:100, y:461, leads:118, month:'Jan 2025', mom:null,    label:'Starting baseline' },
  { x:248, y:439, leads:161, month:'Feb 2025', mom:'+36%',  label:'Campaign launched' },
  { x:396, y:452, leads:136, month:'Mar 2025', mom:'−16%',  label:'Seasonal dip' },
  { x:544, y:362, leads:310, month:'Apr 2025', mom:'+128%', label:'Peak growth month' },
  { x:692, y:413, leads:211, month:'May 2025', mom:'−32%',  label:'Post-campaign settle' },
  { x:840, y:400, leads:237, month:'Jun 2025', mom:'+12%',  label:'Steady recovery' },
];

// ────────────────────────────────────────────
// SMOOTH INTERPOLATION (catmull-rom approx)
// ────────────────────────────────────────────
function smoothstep(t) { return t * t * (3 - 2 * t); }

function getAtX(mx) {
  mx = Math.max(DATA[0].x, Math.min(DATA[DATA.length-1].x, mx));
  for (let i = 0; i < DATA.length - 1; i++) {
    const a = DATA[i], b = DATA[i+1];
    if (mx >= a.x && mx <= b.x) {
      const t  = smoothstep((mx - a.x) / (b.x - a.x));
      const t2 = (mx - a.x) / (b.x - a.x);
      return {
        x:      mx,
        y:      a.y + (b.y - a.y) * t,
        leads:  Math.round(a.leads + (b.leads - a.leads) * t),
        month:  t2 < 0.5 ? a.month  : b.month,
        mom:    t2 < 0.5 ? a.mom    : b.mom,
        label:  t2 < 0.5 ? a.label  : b.label,
      };
    }
  }
  return DATA[DATA.length-1];
}

// ────────────────────────────────────────────
// COUNTER ANIMATION
// ────────────────────────────────────────────
function countUp(el, from, to, ms) {
  const start = performance.now();
  function frame(now) {
    const p = Math.min((now - start) / ms, 1);
    const e = 1 - Math.pow(1 - p, 4); // ease-out quart
    el.textContent = Math.round(from + (to - from) * e).toLocaleString();
    if (p < 1) requestAnimationFrame(frame);
    else el.textContent = to.toLocaleString();
  }
  requestAnimationFrame(frame);
}

// ────────────────────────────────────────────
// TRIGGER ALL ANIMATIONS
// ────────────────────────────────────────────
function runAll() {
  // Reset CSS animations
  ['chart-line', 'chart-area', 'spark-line', 'donut-fill'].forEach(id => {
    const el = id === 'donut-fill'
      ? document.getElementById('donut-fill')
      : document.querySelector('.' + id.replace('-', '-'));
    // toggle class
  });

  // Re-apply animation classes
  const line  = document.getElementById('chart-line');
  const area  = document.querySelector('.chart-area');
  const spark = document.querySelector('.spark-line');
  const donut = document.getElementById('donut-fill');

  [line, area, spark, donut].forEach(el => {
    el.classList.remove('run');
    void el.getBoundingClientRect(); // force reflow
    el.classList.add('run');
  });

  // Counter
  countUp(document.getElementById('visitors-count'), 2000, 18400, 1600);
}

// ────────────────────────────────────────────
// INTERSECTION OBSERVER  — re-runs every time
// card scrolls into view (threshold 30%)
// ────────────────────────────────────────────
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) runAll(); });
}, { threshold: 0.3 });

io.observe(document.getElementById('dash'));

// Also fire on first load
if (document.readyState === 'complete') runAll();
else window.addEventListener('load', runAll);

// ────────────────────────────────────────────
// CHART HOVER
// ────────────────────────────────────────────
const svg    = document.getElementById('dash');
const hovG   = document.getElementById('hov');
const hovL   = document.getElementById('hov-line');
const hovR2  = document.getElementById('hov-ring2');
const hovR1  = document.getElementById('hov-ring1');
const hovDot = document.getElementById('hov-dot');
const hovCard= document.getElementById('hov-card');
const hovArr = document.getElementById('hov-arr');
const hovMon = document.getElementById('hov-month');
const hovLd  = document.getElementById('hov-leads');
const hovChg = document.getElementById('hov-change');
const hovLbl = document.getElementById('hov-label');
const hovZone= document.getElementById('hov-zone');

const CW = 120, CH = 62; // card width / height

function svgX(evt) {
  const r = svg.getBoundingClientRect();
  return (evt.clientX - r.left) * (960 / r.width);
}

hovZone.addEventListener('mousemove', evt => {
  const mx  = svgX(evt);
  const d   = getAtX(mx);
  const cx  = d.x;
  const cy  = d.y;

  // vertical guide + dots
  hovL.setAttribute('x1', cx); hovL.setAttribute('x2', cx); hovL.setAttribute('y2', 522);
  [hovR2, hovR1, hovDot].forEach(el => {
    el.setAttribute('cx', cx); el.setAttribute('cy', cy);
  });

  // card position (keep inside bounds)
  let cardX = cx - CW / 2;
  if (cardX < 40)       cardX = 40;
  if (cardX + CW > 916) cardX = 916 - CW;
  const cardY = Math.max(308, cy - CH - 24);

  hovCard.setAttribute('x', cardX);
  hovCard.setAttribute('y', cardY);

  const cx2 = cardX + CW / 2;
  const arrowBase = +cardY + CH;
  hovArr.setAttribute('points',
    `${cx2},${arrowBase+8} ${cx2-7},${arrowBase} ${cx2+7},${arrowBase}`);

  // text
  hovMon.setAttribute('x', cx2); hovMon.setAttribute('y', +cardY + 16);
  hovLd.setAttribute('x',  cx2); hovLd.setAttribute('y',  +cardY + 36);
  hovChg.setAttribute('x', cx2); hovChg.setAttribute('y', +cardY + 51);
  hovLbl.setAttribute('x', cx2); hovLbl.setAttribute('y', +cardY + 61);

  hovMon.textContent  = d.month;
  hovLd.textContent   = d.leads.toLocaleString() + ' leads';
  hovChg.textContent  = d.mom  ? 'MoM ' + d.mom : 'Baseline';
  hovLbl.textContent  = d.label;

  hovG.setAttribute('visibility', 'visible');
});

hovZone.addEventListener('mouseleave', () => {
  hovG.setAttribute('visibility', 'hidden');
});
</script>
</body>
</html>
